<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siddesh X</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      overflow:hidden;
      background:#030712;
      color:white;
      font-family:'Poppins',sans-serif;
    }

    #world{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      cursor:grab;
      perspective:2000px;
    }

    .map{
      transform-style:preserve-3d;
      position:absolute;
      width:5000px;
      height:5000px;
      transform-origin:center center;
      transition:transform 4.5s cubic-bezier(0.22,1,0.36,1);
      background:
      radial-gradient(circle at center, rgba(59,130,246,0.15), transparent 40%),
      radial-gradient(circle at 20% 30%, rgba(168,85,247,0.12), transparent 30%),
      radial-gradient(circle at 80% 70%, rgba(236,72,153,0.10), transparent 30%),
      #020617;
    }

    .grid{
      position:absolute;
      inset:0;
      background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:80px 80px;
    }

    .node{
      animation:hoverFloat 6s ease-in-out infinite;
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(20px);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Orbitron',sans-serif;
      font-size:14px;
      letter-spacing:2px;
      color:white;
      cursor:pointer;
      transition:0.5s;
      box-shadow:0 0 50px rgba(59,130,246,0.2);
    }

    .node:hover{
      transform:scale(1.1);
      box-shadow:0 0 80px rgba(168,85,247,0.6);
    }

    .line{
      position:absolute;
      height:2px;
      background:linear-gradient(to right, rgba(59,130,246,0.5), rgba(168,85,247,0.4));
      transform-origin:left center;
    }

    .panel{
      position:fixed;
      right:40px;
      top:50%;
      transform:translateY(-50%);
      width:420px;
      padding:35px;
      border-radius:35px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(30px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 100px rgba(59,130,246,0.15);
      z-index:100;
    }

    .small{
      color:#60a5fa;
      font-size:14px;
      letter-spacing:4px;
      margin-bottom:20px;
      font-family:'Orbitron',sans-serif;
    }

    .title{
      font-size:42px;
      line-height:1.1;
      margin-bottom:20px;
      font-weight:700;
    }

    .desc{
      color:#cbd5e1;
      line-height:1.9;
      min-height:150px;
      font-size:15px;
    }

    .counter{
      margin-top:30px;
      display:flex;
      gap:12px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:rgba(255,255,255,0.2);
      transition:0.4s;
    }

    .dot.active{
      background:#60a5fa;
      transform:scale(1.4);
      box-shadow:0 0 20px #60a5fa;
    }

    .intro{
      position:fixed;
      inset:0;
      background:#01040b;
      z-index:999;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      animation:fadeOut 2s ease forwards;
      animation-delay:3s;
    }

    .intro h1{
      font-size:90px;
      font-family:'Orbitron',sans-serif;
      background:linear-gradient(90deg,#60a5fa,#a855f7,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:10px;
      animation:pulse 2s infinite;
    }

    .intro p{
      margin-top:20px;
      color:#94a3b8;
      letter-spacing:5px;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.05)}
    }

    @keyframes fadeOut{
      to{
        opacity:0;
        visibility:hidden;
      }
    }

    .typing::after{
      content:'|';
      animation:blink .8s infinite;
    }

    @keyframes blink{
      50%{opacity:0}
    }

    .ambient{
      transform:translateZ(-200px);
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      filter:blur(120px);
      opacity:0.18;
      animation:float 12s infinite alternate ease-in-out;
    }

    .a1{background:#3b82f6; top:10%; left:10%;}
    .a2{background:#a855f7; bottom:10%; right:10%;}
    .a3{background:#ec4899; top:50%; left:50%;}

    @keyframes hoverFloat{
      0%,100%{transform:translateY(0px)}
      50%{transform:translateY(-15px)}
    }

    @keyframes float{
      from{transform:translateY(-30px) translateX(-20px)}
      to{transform:translateY(40px) translateX(40px)}
    }

    @media(max-width:900px){
      .panel{
        width:90%;
        left:50%;
        transform:translate(-50%,0);
        top:auto;
        bottom:20px;
      }

      .title{
        font-size:30px;
      }
    }
  </style>
</head>
<body>

<div class="intro">
  <h1>SIDDESH X</h1>
  <p>ENTERING INTERACTIVE EXPERIENCE</p>
</div>

<div id="world">

  <div class="map" id="map">

    <div class="grid"></div>

    <div style="position:absolute; inset:0; background:radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.55)); pointer-events:none;"></div>

    <div class="ambient a1"></div>
    <div class="ambient a2"></div>
    <div class="ambient a3"></div>

    <div class="node" style="left:500px; top:700px;" onclick="focusNode(0)">START</div>
    <div class="node" style="left:1200px; top:1200px;" onclick="focusNode(1)">ABOUT</div>
    <div class="node" style="left:2000px; top:900px;" onclick="focusNode(2)">SKILLS</div>
    <div class="node" style="left:3000px; top:1400px;" onclick="focusNode(3)">PROJECTS</div>
    <div class="node" style="left:3800px; top:900px;" onclick="focusNode(4)">CYBER</div>
    <div class="node" style="left:4200px; top:2000px;" onclick="focusNode(5)">LINUX</div>
    <div class="node" style="left:3500px; top:3000px;" onclick="focusNode(6)">AI</div>
    <div class="node" style="left:2500px; top:3600px;" onclick="focusNode(7)">DEV</div>
    <div class="node" style="left:1300px; top:3100px;" onclick="focusNode(8)">FUTURE</div>
    <div class="node" style="left:700px; top:2200px;" onclick="focusNode(9)">RETURN</div>

  </div>

</div>

<div class="panel">
  <div class="small">AERIAL EXPERIENCE</div>
  <div class="title" id="title">Welcome</div>
  <div class="desc typing" id="desc"></div>

  <div class="counter" id="counter"></div>
</div>

<script>

const data = [
  {
    title:'Drone View Activated',
    text:'A cinematic aerial journey through my digital universe. The camera glides like a luxury drone shot, smoothly traveling across futuristic zones that reveal different parts of my world.',
    x:500,
    y:700,
    scale:1.9
  },
  {
    title:'Who Am I?',
    text:'I am Siddesh — a tech enthusiast obsessed with futuristic interfaces, Linux systems, cybersecurity concepts, AI-powered experiences, and pushing creativity beyond ordinary portfolios.',
    x:1200,
    y:1200,
    scale:2.3
  },
  {
    title:'My Skills',
    text:'Python, Java, C Programming, Flutter, HTML, CSS, JavaScript, Linux environments, UI experimentation, Odoo development, and interactive design systems.',
    x:2000,
    y:900,
    scale:2.4
  },
  {
    title:'Projects',
    text:'From accessibility-focused AI browser assistants to Flutter mobile applications and futuristic UI experiments — I enjoy building systems that feel alive.',
    x:3000,
    y:1400,
    scale:2.5
  },
  {
    title:'Cyber Exploration',
    text:'I explore Kali Linux environments, ethical hacking concepts, terminal workflows, and experimental operating system customization.',
    x:3800,
    y:900,
    scale:2.3
  },
  {
    title:'Linux Universe',
    text:'Linux gives complete creative freedom. From desktop customization to system-level experimentation, it is where I explore without limitations.',
    x:4200,
    y:2000,
    scale:2.6
  },
  {
    title:'AI Vision',
    text:'I believe AI should be immersive, accessible, and interactive. My projects focus on creating smarter digital experiences for real users.',
    x:3500,
    y:3000,
    scale:2.4
  },
  {
    title:'Developer Mode',
    text:'I enjoy combining clean design, animation, and logic to create interfaces that feel premium instead of static.',
    x:2500,
    y:3600,
    scale:2.5
  },
  {
    title:'Future Goals',
    text:'To create futuristic experiences that combine design, AI, interaction, and engineering into something unforgettable.',
    x:1300,
    y:3100,
    scale:2.3
  },
  {
    title:'Loop Complete',
    text:'The experience loops infinitely — just like curiosity, experimentation, and creativity.',
    x:700,
    y:2200,
    scale:2.1
  }
]

const map = document.getElementById('map')
const title = document.getElementById('title')
const desc = document.getElementById('desc')
const counter = document.getElementById('counter')

let current = 0

for(let i=0;i<data.length;i++){
  const dot = document.createElement('div')
  dot.className = 'dot'
  counter.appendChild(dot)
}

function typeText(text){
  desc.innerHTML=''
  let i=0

  const interval = setInterval(()=>{
    desc.innerHTML += text.charAt(i)
    i++

    if(i >= text.length){
      clearInterval(interval)
    }
  },18)
}

function focusNode(index){

  current = index

  const item = data[index]

  const x = window.innerWidth/2 - item.x * item.scale
  const y = window.innerHeight/2 - item.y * item.scale

  const rotateX = 8
  const rotateY = (index % 2 === 0 ? -6 : 6)

  map.style.transform = `translate(${x}px, ${y}px) scale(${item.scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`

  title.innerText = item.title

  typeText(item.text)

  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active', i===index)
  })
}

focusNode(0)

setInterval(()=>{
  current = (current + 1) % data.length
  focusNode(current)
},12000)

</script>

</body>
</html>
